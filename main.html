<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<lable for="name">Name</lable>
		<input type="text" id="name" placeholder="Name">
		<br>

		<lable for="email">Email</lable>
		<input type="email" id="email" placeholder="Email">
		<br>

		<lable for="Gender">Gender</lable>
		<input type="radio" name="gender" id="gender_m"> Male
		<input type="radio" name="gender" id="gender_f"> Female
		<br>

		<lable for="car brands">Car Brands</lable>
		<select id="cars">
		<option>Toyota</option>
		<option>BMW</option>
		<option>Audi</option>
		</select>
		<br>

		<lable for="age">Age</lable>
		<input type="number" id="age" placeholder="Age">
		<br>

		<lable for="DOB">DOB</lable>
		<input type="date" id="dob">
		<br>

		<lable for="phone number">Phone Number</lable>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		<br>

		<lable for="password">Password</lable>
		<input type="password" id="password" placeholder="Password">
		<br>

		<lable for="checkbox">I agree to the TOS</lable>
		<input type="checkbox" id="tos">
												
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
